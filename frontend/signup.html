<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- SEO -->
    <link rel="canonical" href="https://www.bhuvansh.xyz/signup.html">
    <meta
        name="description"
        content="Create your AnthropicBots E-Commerce account and start shopping securely."
    >

    <meta
        name="keywords"
        content="signup, ecommerce account, create account, register"
    >

    <meta
        name="author"
        content="AnthropicBots E-Commerce"
    >
    <title>
        Sign Up | AnthropicBots E-Commerce
    </title>

    <!-- Favicon -->
    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <!-- Styles -->
    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/hero.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >

    <link
        rel="stylesheet"
        href="styles/back-to-top.css"
    >

    <link
        rel="stylesheet"
        href="styles/auth.css"
    >

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >
</head>

<body>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Signup -->
    <section class="auth-container">
        <div class="auth-box">
            <h2>
                Create Account
            </h2>
            <p>
                Join AnthropicBots E-Commerce
            </p>

            <!-- Signup Form -->
            <form id="signup-form">
                <input
                    type="text"
                    id="signup-name"
                    placeholder="Full Name"
                    autocomplete="name"
                    required
                >
                <input
                    type="email"
                    id="signup-email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                >
                <input
                    type="password"
                    id="signup-password"
                    placeholder="Password"
                    autocomplete="new-password"
                    required
                >
                <button
                    type="submit"
                    class="auth-btn"
                >
                    Create Account
                </button>
            </form>

            <!-- OTP Verification Form (Hidden by default) -->
            <form id="otp-form" style="display: none;">
                <p>We've sent a 6-digit OTP to your email. Please enter it to verify your account.</p>
                <input
                    type="text"
                    id="otp-input"
                    placeholder="Enter 6-digit OTP"
                    maxlength="6"
                    required
                >
                <button
                    type="submit"
                    class="auth-btn"
                >
                    Verify OTP
                </button>
                <div style="text-align: center; margin-top: 15px;">
                    <p class="auth-switch" style="margin-top: 15px;">
                        Didn't receive code? <a href="#" id="resend-signup-otp-link">Resend OTP</a>
                        <span id="resend-signup-timer" style="display: none; color: #777;">(60s)</span>
                    </p>
                </div>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>
                    OR
                </span>
            </div>

            <!-- Social Buttons -->
            <button
                class="social-btn google-btn"
                id="google-login"
            >
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
            <button
                class="social-btn github-btn"
                id="github-login"
            >
                <i class="fab fa-github"></i>
                Continue with GitHub
            </button>
            <button
                class="social-btn apple-btn"
                id="apple-login"
            >
                <i class="fab fa-apple"></i>
                Continue with Apple
            </button>

            <!-- Switch -->
            <p class="auth-switch">
                Already have an account?
                <a href="signin.html">
                    Sign In
                </a>
            </p>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Core Scripts -->
    <script
        defer
        src="scripts/config.js"
    ></script>

    <script
        defer
        src="scripts/toast.js"
    ></script>

    <script
        defer
        src="scripts/utils.js"
    ></script>

    <script
        defer
        src="scripts/components.js"
    ></script>

    <!-- Firebase -->
    <script src="scripts/runtime-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="scripts/firebase.js"></script>

    <!-- Auth Script -->
    <script
        defer
        src="scripts/auth.js"
    ></script>
    <script defer src="scripts/ui.js"></script>

    <script
        defer
        src="scripts/back-to-top.js"
    ></script>

</body>
</html>
