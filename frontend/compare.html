<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Compare Products | Cara Fashion Store</title>

    <link
        rel="icon"
        type="image/png"
        href="assets/images/logo.png"
    >

    <link
        rel="stylesheet"
        href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
    >

    <link
        rel="stylesheet"
        href="styles/base.css"
    >

    <link
        rel="stylesheet"
        href="styles/layout.css"
    >

    <link
        rel="stylesheet"
        href="styles/components.css"
    >

    <link
        rel="stylesheet"
        href="styles/product-card.css"
    >

    <link
        rel="stylesheet"
        href="styles/style.css"
    >
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Compare Section -->
    <section
        id="compare-page"
        class="section-p1"
    >
        <h2>
            Compare Products
        </h2>

        <p>
            Compare selected products side by side
        </p>

        <div
            id="compare-container"
            class="products-grid"
        ></div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Core Scripts -->
    <script
        src="scripts/config.js"
    ></script>

    <script
        src="scripts/toast.js"
    ></script>

    <script
        src="scripts/utils.js"
    ></script>

    <script
        src="scripts/components.js"
    ></script>

    <!-- Compare Script -->
    <script
        src="scripts/compare.js"
    ></script>

</body>

</html>
